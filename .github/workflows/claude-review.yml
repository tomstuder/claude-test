name: Claude Issue Review

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))

    steps:
      - name: Call Claude and post comment
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const https = require('https');

            // Safe: accessed via context.payload (JS object), not shell interpolation
            const issueTitle = context.payload.issue.title;
            const issueBody = context.payload.issue.body || '';
            const commentBody = context.payload.comment?.body || '';
            const eventName = context.eventName;

            const userContent = eventName === 'issue_comment'
              ? `Issue Title: ${issueTitle}\n\nIssue Body:\n${issueBody}\n\nComment:\n${commentBody}`
              : `Issue Title: ${issueTitle}\n\nIssue Body:\n${issueBody}`;

            const prompt = `You are a helpful code reviewer on GitHub. A user has mentioned @claude in a GitHub issue requesting your help. Review the issue and provide helpful, actionable feedback.\n\n${userContent}`;

            const data = JSON.stringify({
              model: 'claude-sonnet-4-6',
              max_tokens: 1024,
              messages: [{ role: 'user', content: prompt }]
            });

            const response = await new Promise((resolve, reject) => {
              const req = https.request({
                hostname: 'api.anthropic.com',
                path: '/v1/messages',
                method: 'POST',
                headers: {
                  'x-api-key': process.env.ANTHROPIC_API_KEY,
                  'anthropic-version': '2023-06-01',
                  'content-type': 'application/json',
                  'content-length': Buffer.byteLength(data)
                }
              }, (res) => {
                let body = '';
                res.on('data', chunk => body += chunk);
                res.on('end', () => resolve(JSON.parse(body)));
              });
              req.on('error', reject);
              req.write(data);
              req.end();
            });

            if (!response.content || !response.content[0]) {
              throw new Error(`Claude API error: ${JSON.stringify(response)}`);
            }

            const reply = response.content[0].text;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `**Claude's Review:**\n\n${reply}`
            });
